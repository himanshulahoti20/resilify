# .github/workflows/publish.yml
# Publishes resilify to pub.dev when a version tag (v*) is pushed.
# Uses OIDC — no secrets needed.

name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*" # v1.0.2, v2.0.0, v1.0.0-beta.1

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC auth to pub.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      # Safety: tag must match pubspec version exactly
      - name: Verify tag matches pubspec version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PUBSPEC=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | tr -d ' ')
          echo "Tag:     $TAG"
          echo "Pubspec: $PUBSPEC"
          if [ "$TAG" != "$PUBSPEC" ]; then
            echo "::error::Tag v$TAG does not match pubspec.yaml version $PUBSPEC"
            exit 1
          fi

      - name: Dry run (catch issues before upload)
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish --force
